<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页设置 — 后台管理</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-logo">P & Y 管理</div>
      <ul class="sidebar-nav">
        <li><a href="/admin">仪表盘</a></li>
        <li><a href="/admin/entries.html">内容管理</a></li>
        <li><a href="/admin/messages.html">读者消息</a></li>
        <li><a href="/admin/homepage-edit.html" class="active">首页设置</a></li>
        <li><a href="/admin/about-edit.html">关于页设置</a></li>
        <div class="sidebar-divider"></div>
        <li><a href="/" target="_blank">查看网站</a></li>
        <li><a href="#" onclick="logout()">退出登录</a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <div class="page-header">
        <h1 class="page-title">首页设置</h1>
      </div>

      <form id="homepageForm">
        <div class="card">
          <div class="card-title">Hero 封面图</div>
          <div class="image-upload" onclick="document.getElementById('heroImageFile').click()">
            <p class="image-upload-text">点击上传封面图</p>
            <input type="file" id="heroImageFile" accept="image/*" style="display:none;">
          </div>
          <img id="heroImagePreview" class="image-preview" style="display:none;">
        </div>

        <div class="card">
          <div class="card-title">文字内容</div>

          <div class="form-group">
            <label class="form-label">标题</label>
            <input type="text" class="form-input" id="heroTitle">
          </div>

          <div class="form-group">
            <label class="form-label">副标题</label>
            <textarea class="form-textarea" id="heroSubtitle" rows="3"></textarea>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label class="form-label">按钮文字</label>
              <input type="text" class="form-input" id="ctaText">
            </div>
            <div class="form-group">
              <label class="form-label">按钮链接</label>
              <input type="text" class="form-input" id="ctaLink">
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary">保存设置</button>
      </form>
    </main>
  </div>

  <script src="/admin/js/admin-common.js"></script>
  <script src="/admin/js/homepage-edit.js"></script>
</body>
</html>
