<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑故事 — 后台管理</title>
  <link rel="stylesheet" href="/admin/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-logo">P & Y 管理</div>
      <ul class="sidebar-nav">
        <li><a href="/admin">仪表盘</a></li>
        <li><a href="/admin/entries.html" class="active">内容管理</a></li>
        <li><a href="/admin/messages.html">读者消息</a></li>
        <li><a href="/admin/homepage-edit.html">首页设置</a></li>
        <li><a href="/admin/about-edit.html">关于页设置</a></li>
        <div class="sidebar-divider"></div>
        <li><a href="/" target="_blank">查看网站</a></li>
        <li><a href="#" onclick="logout()">退出登录</a></li>
      </ul>
    </aside>

    <main class="admin-main">
      <div class="page-header">
        <h1 class="page-title" id="pageTitle">新建故事</h1>
        <a href="/admin/entries.html" class="btn btn-secondary">返回列表</a>
      </div>

      <form id="entryForm">
        <div class="card">
          <div class="card-title">基本信息</div>

          <div class="form-group">
            <label class="form-label">标题</label>
            <input type="text" class="form-input" id="title" required>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label class="form-label">时间</label>
              <input type="date" class="form-input" id="date" required>
            </div>
            <div class="form-group">
              <label class="form-label">地点</label>
              <input type="text" class="form-input" id="location" placeholder="如：肯尼亚·内罗毕">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">分类</label>
            <select class="form-select" id="category">
              <option value="travel">旅行</option>
              <option value="wedding">重要时刻</option>
              <option value="daily">日常生活</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">标签</label>
            <div class="tag-input-wrap" id="tagWrap">
              <input type="text" class="tag-input" id="tagInput" placeholder="输入标签后按回车">
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">图片</div>
          <div class="image-upload" id="imageUpload" onclick="document.getElementById('imageFile').click()">
            <p class="image-upload-text">点击上传图片（上传后可裁剪）</p>
            <input type="file" id="imageFile" accept="image/*" style="display:none;">
          </div>
          <img id="imagePreview" class="image-preview" style="display:none;">
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button type="button" class="btn btn-secondary btn-sm" id="recropBtn" style="display:none;">裁剪</button>
            <button type="button" class="btn btn-secondary btn-sm" id="restoreBtn" style="display:none;">复原</button>
          </div>
        </div>

        <!-- Crop Modal -->
        <div class="crop-modal" id="cropModal">
          <div class="crop-modal-inner">
            <div class="crop-modal-header">
              <span class="crop-modal-title">裁剪图片</span>
              <div style="display:flex;gap:6px;">
                <button type="button" class="btn btn-secondary btn-sm crop-ratio active" data-ratio="0">自由</button>
                <button type="button" class="btn btn-secondary btn-sm crop-ratio" data-ratio="0.8">4:5</button>
                <button type="button" class="btn btn-secondary btn-sm crop-ratio" data-ratio="1.778">16:9</button>
                <button type="button" class="btn btn-secondary btn-sm crop-ratio" data-ratio="1">1:1</button>
              </div>
            </div>
            <div class="crop-container">
              <img id="cropImage">
            </div>
            <div class="crop-modal-footer">
              <button type="button" class="btn btn-secondary" id="cropCancel">取消</button>
              <button type="button" class="btn btn-primary" id="cropConfirm">确认裁剪</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div class="card-title" style="margin-bottom:0;">故事内容</div>
            <button type="button" class="btn btn-ai" id="aiGenBtn">AI 生成故事</button>
          </div>
          <div class="form-group">
            <textarea class="form-textarea" id="story" rows="8" placeholder="写下你们的故事..."></textarea>
          </div>
        </div>

        <div style="display:flex;gap:12px;">
          <button type="submit" class="btn btn-primary">保存</button>
          <a href="/admin/entries.html" class="btn btn-secondary">取消</a>
        </div>
      </form>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script src="/admin/js/admin-common.js"></script>
  <script src="/admin/js/entry-form.js"></script>
</body>
</html>
